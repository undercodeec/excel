{% extends "base.html" %}
{% block title %}Login - {{ app_name }}{% endblock %}
{% block contenido %}
<section class="panel panel-login">
  <h1>Iniciar sesion</h1>
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="form-login">
    <input type="hidden" name="next_url" value="{{ next_url }}">
    <label>Empresa ID
      <input type="number" name="empresa_id" min="1" value="{{ empresa_id }}">
    </label>
    <label>Usuario
      <input type="text" name="username" value="{{ username }}" autocomplete="username" required autofocus>
    </label>
    <label>Contrasena
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Entrar</button>
  </form>
  <p class="ayuda-login">Primer acceso local: admin / admin123.</p>
</section>
{% endblock %}
